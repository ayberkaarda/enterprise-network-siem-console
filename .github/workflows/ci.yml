name: Enterprise SIEM CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 26
        uses: actions/setup-java@v3
        with:
          java-version: '26'
          distribution: 'temurin'
      - name: Build with Maven
        working-directory: ./demo
        run: mvn clean package -DskipTests

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - name: Build Angular Application
        working-directory: ./network-ui
        run: |
          npm install
          npm run build